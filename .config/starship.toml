# Replace the 'вқҜ О» пң№' symbol in the prompt with 'вһң'
[character]
success_symbol = '[вқҜ](bold #524f67)'
error_symbol = '[вқҜ](bold #eb6f92)'
vimcmd_symbol = '[N](bold #9ccfd8)'
vimcmd_replace_one_symbol = '[r](bold #f6c177)'
vimcmd_replace_symbol = '[R](bold #f6c177)'
vimcmd_visual_symbol = '[V](bold #908caa)'

[cmd_duration]
style = 'bold #f6c177'
format = '[пІҠ $duration](#f6c177)' # пү’

[directory]
style = 'bold #31748f'
truncation_length = 3
truncate_to_repo = true
use_logical_path = true
fish_style_pwd_dir_length = 1
disabled = false
read_only = ' п Ҫ'

[git_branch]
style = 'bold #c4a7e7'
symbol = 'п„“  п„Ұ ' # рҹҢұ
disabled = false

[git_commit]
style = '#908caa'
commit_hash_length = 7
tag_symbol = 'рҹ”– '
disabled = false

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = '[рҹҚ’ PICKING](bold #eb6f92)'

[git_metrics]
added_style = 'bold #9ccfd8'
format = '[+$added]($added_style)/[-$deleted]($deleted_style) '

# Configure the Git symbols
[git_status]
# пҒҶ пҶ–
format = '([\[$all_status$ahead_behind \]]($style) )'
style = 'bold #eb6f92'
ahead = ' [пҒў $count](#6e6a86)'
up_to_date = ' [пҖҢ $count](#31748f)'
diverged = ' [пҖҚ](#eb6f92) [пҒў $ahead_count пҒЈ $behind_count](#6e6a86)'
behind = ' [пҒЈ $count](#6e6a86)'
conflicted = ' [пғ¬  $count]' # рҹҸі
deleted = ' [рҹ—‘ $count](#eb6f92)'
modified = ' [п…Ӣ $count](#908caa)' # рҹ“қ
stashed = ' [оүҖ $count](#ebbcba)'
staged = ' [пғҫ $count](#31748f)'
renamed = ' [п‘ҡ $count](#ebbcba)' # рҹ‘…
untracked = ' [пҒҷ $count](#f6c177)'
# prefix = '|'
# suffix = ' | '
# show_sync_count = true
# conflicted_count.enabled = true
# deleted_count.enabled = true
# modified_count.enabled = true
# stashed_count.enabled = true
# staged_count.enabled = true
# renamed_count.enabled = true
# untracked_count.enabled = true

[hostname]
style = 'bold #9ccfd8'

[username]
format = '[$user]($style) on '
style_user = 'bold #ebbcba'
show_always = false
disabled = true

[jobs]
symbol = 'пҗЈ' #рҹ’ 
disabled = false

[line_break]
disabled = false

# Configure the battery display
[battery]
full_symbol = 'пүҖ'
charging_symbol = 'п–Ү'
discharging_symbol = 'пү„'
[[battery.display]]
threshold = 15
style = 'bold #eb6f92'

